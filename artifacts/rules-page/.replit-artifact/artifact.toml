kind = "web"
previewPath = "/"
title = "Comment Rules"
version = "1.0.0"
id = "artifacts/rules-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24659

[services.development]
run = "pnpm --filter @workspace/rules-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rules-page", "run", "build" ]
publicDir = "artifacts/rules-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24659"
BASE_PATH = "/"
